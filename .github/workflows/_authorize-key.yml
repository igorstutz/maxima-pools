name: Authorize temp SSH key

# TEMPORARY — registers a public key on the Hostinger server so leads can be
# read locally. Delete this workflow after use. Only handles public keys
# (not secret); the private deploy key comes from the masked repo secret.
on:
  workflow_dispatch:
    inputs:
      pubkey:
        description: "SSH public key to authorize on the server"
        required: true

jobs:
  authorize:
    runs-on: ubuntu-latest
    steps:
      - name: Append public key to server authorized_keys (idempotent)
        env:
          PRIVKEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          PUBKEY: ${{ github.event.inputs.pubkey }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$PRIVKEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh -i ~/.ssh/id_deploy -p "$SSH_PORT" -o StrictHostKeyChecking=no \
            "$SSH_USER@$SSH_HOST" \
            "mkdir -p ~/.ssh && chmod 700 ~/.ssh && touch ~/.ssh/authorized_keys && chmod 600 ~/.ssh/authorized_keys && grep -qxF '$PUBKEY' ~/.ssh/authorized_keys && echo ALREADY_PRESENT || { echo '$PUBKEY' >> ~/.ssh/authorized_keys && echo KEY_ADDED; }"
