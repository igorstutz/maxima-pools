name: Check Submissions (temp diagnostic)

# Temporary, manually-triggered workflow to inspect the contact-form
# submissions audit log WITHOUT exposing any personal data.
# It prints ONLY: ts | source | poolSize | email_status | email_error
# (no name / email / phone / address / message / ip / ua).
# Safe to delete once the diagnostic is done.

on:
  workflow_dispatch:

concurrency:
  group: check-submissions
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Read submissions log (non-PII summary only)
        env:
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          REMOTE_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          REMOTE_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

          cat > remote.sh <<'EOF'
          LOG="domains/maximapools.com/public_html/.private/submissions.log"
          if [ ! -f "$LOG" ]; then
            echo "LOG FILE NOT FOUND at $LOG"
            ls -la domains/maximapools.com/public_html/.private/ 2>&1 || true
            exit 0
          fi
          echo "=== total entries in log (all time) ==="
          wc -l < "$LOG"
          echo
          echo "=== ts | source | poolSize | email_status | email_error  (Log Test User excluded) ==="
          jq -rR 'fromjson? | select(.name != "Log Test User") | [.ts,(.source//"-"),(.poolSize//"-"),(.email_status//"-"),(.email_error//"-")] | @tsv' "$LOG"
          echo
          echo "=== last 5 raw timestamps only (to confirm ts format) ==="
          jq -rR 'fromjson? | .ts' "$LOG" | tail -5
          EOF

          ssh -i ~/.ssh/id_deploy -p "$REMOTE_PORT" \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "$REMOTE_USER@$REMOTE_HOST" 'bash -s' < remote.sh
