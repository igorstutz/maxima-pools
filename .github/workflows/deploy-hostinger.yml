name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hostinger
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export (root-domain build, no basePath)
        run: npx next build

      - name: Deploy to Hostinger via rsync over SSH
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          REMOTE_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          REMOTE_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          SOURCE: "out/"
          TARGET: "domains/maximapools.com/public_html/"
          # rsync flags:
          #   -r recursive, -l symlinks, -t times, -z compress
          #   --delete removes files on the server that no longer exist locally
          ARGS: "-rltzv --delete"
          # Excluded paths are NOT uploaded AND NOT deleted on the server, so
          # the customized api/submit.php (with the real SMTP password) and the
          # legacy wp-content/ folder (where the pool photos still live) stay
          # intact across deploys.
          EXCLUDE: "/api/submit.php, /wp-content/, /.private/, .git*, node_modules/"
