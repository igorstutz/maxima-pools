name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npx next build
        env:
          GITHUB_PAGES: "true"

      - name: Fix asset paths for GitHub Pages
        run: |
          # Fix image src paths that don't have basePath prefix
          find out -name '*.html' -exec sed -i \
            -e 's|src="/images/|src="/maxima-pools/images/|g' \
            -e 's|src="/favicon|src="/maxima-pools/favicon|g' \
            -e 's|src="/apple-|src="/maxima-pools/apple-|g' \
            {} +
          # Fix any remaining local asset paths in JS chunks
          find out/_next -name '*.js' -exec sed -i \
            -e 's|"/images/|"/maxima-pools/images/|g' \
            {} +
          # Add .nojekyll
          touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
