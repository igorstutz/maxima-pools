backend:
  name: github
  repo: igorstutz/maxima-pools
  branch: main
  # The OAuth handshake is served by our own PHP proxy on Hostinger,
  # so login stays on our domain (no third-party service).
  base_url: https://maximapools.com
  auth_endpoint: api/oauth/authorize.php
  commit_messages:
    create: 'content: create {{collection}} “{{slug}}” (via CMS)'
    update: 'content: update {{collection}} “{{slug}}” (via CMS)'
    delete: 'content: delete {{collection}} “{{slug}}” (via CMS)'
    uploadMedia: 'content: upload “{{path}}” (via CMS)'
    deleteMedia: 'content: delete “{{path}}” (via CMS)'

site_url: https://maximapools.com
display_url: https://maximapools.com

# Uploaded images are committed into the repo and deployed with the site.
media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: pages
    label: "Pages"
    description: "Edit the text and images of your website pages."
    files:
      - name: contact
        label: "Contact / Free Estimate Page"
        file: "src/content/pages/contact.json"
        format: json
        preview_path: "contact/"
        fields:
          - label: "SEO"
            name: seo
            widget: object
            collapsed: true
            fields:
              - { label: "Browser / Search Title", name: title, widget: string, hint: "Shown in the browser tab and as the headline in Google results." }
              - { label: "Meta Description", name: description, widget: text, hint: "The summary Google shows under the title (~155 characters)." }
              - { label: "Social Share Title", name: ogTitle, widget: string, hint: "Title used when the page is shared on Facebook/LinkedIn." }
              - { label: "Social Share Description", name: ogDescription, widget: text }
          - label: "Hero (top of the page)"
            name: hero
            widget: object
            fields:
              - { label: "Small badge", name: badge, widget: string }
              - { label: "Heading — first part", name: headingLead, widget: string, hint: "Plain white text (first part of the heading). A space before the highlighted part is added automatically." }
              - { label: "Heading — highlighted part", name: headingHighlight, widget: string, hint: "Shown with the colored shimmer effect." }
              - { label: "Subtitle paragraph", name: subtitle, widget: text }
              - label: "Trust points (checklist)"
                name: trustPoints
                widget: list
                field: { label: "Point", name: point, widget: string }
              - { label: "Social proof line", name: socialProof, widget: string }
              - label: "Phone button"
                name: phone
                widget: object
                fields:
                  - { label: "Number (shown)", name: display, widget: string }
                  - { label: "Dial link", name: href, widget: string, hint: "Format must be: tel:+16143845081" }
                  - { label: "Small note under the number", name: note, widget: string }
              - { label: "Pool Simulator button link", name: simulatorHref, widget: string, hint: "Internal page starts with / (e.g. /pool-simulator). External starts with https://" }
          - label: "Form card heading"
            name: formCard
            widget: object
            fields:
              - { label: "Title", name: title, widget: string }
              - { label: "Subtitle", name: subtitle, widget: string }
          - label: "'Other ways to contact' heading"
            name: contactMethodsSection
            widget: object
            fields:
              - { label: "Small badge", name: badge, widget: string }
              - { label: "Heading — first part", name: headingLead, widget: string }
              - { label: "Heading — highlighted part", name: headingHighlight, widget: string }
          - label: "Contact method cards"
            name: contactMethods
            widget: list
            summary: "{{fields.label}} — {{fields.value}}"
            fields:
              - { label: "Icon", name: icon, widget: select, options: ["Phone", "Mail", "MapPin"] }
              - { label: "Label", name: label, widget: string, hint: "Keep 'Visit Us' exactly if this card should open in a new tab (map)." }
              - { label: "Value", name: value, widget: string }
              - { label: "Link", name: href, widget: string }
              - { label: "Description", name: description, widget: string }
          - label: "'Why Maxima' section"
            name: whyMaxima
            widget: object
            fields:
              - { label: "Small badge", name: badge, widget: string }
              - { label: "Heading — first part", name: headingLead, widget: string }
              - { label: "Heading — highlighted part", name: headingHighlight, widget: string }
              - { label: "Body paragraph", name: body, widget: text }

      - name: home
        label: "Home Page"
        file: "src/content/pages/home.json"
        format: json
        preview_path: ""
        fields:
          - label: "Hero (top of the page)"
            name: hero
            widget: object
            collapsed: true
            fields:
              - { label: "Small badge", name: badge, widget: string }
              - { label: "Heading — first line", name: headingLead, widget: string, hint: "Plain white text, shown on the first line." }
              - { label: "Heading — highlighted line", name: headingHighlight, widget: string, hint: "Second line, shown with the shimmer effect." }
              - { label: "Subtitle paragraph", name: subtitle, widget: text }
              - { label: "Simulator button label", name: simulatorLabel, widget: string }
              - { label: "Simulator button link", name: simulatorHref, widget: string, hint: "Internal page starts with / (e.g. /pool-simulator). External starts with https://" }
              - { label: "Gallery button label", name: galleryLabel, widget: string }
              - { label: "Gallery button link", name: galleryHref, widget: string, hint: "Internal page starts with / (e.g. /fiberglass-pool-gallery). External starts with https://" }
              - label: "Rotating pool images"
                name: poolImages
                widget: list
                summary: "{{fields.alt}}"
                fields:
                  - { label: "Image", name: src, widget: image }
                  - { label: "Alt text (for SEO/accessibility)", name: alt, widget: string }
              - label: "Rotating mini testimonials"
                name: testimonials
                widget: list
                summary: "{{fields.author}}"
                fields:
                  - { label: "Quote", name: text, widget: string }
                  - { label: "Author", name: author, widget: string }
                  - { label: "Location", name: location, widget: string }
          - label: "Why Maxima section"
            name: whyMaxima
            widget: object
            collapsed: true
            fields:
              - { label: "Small badge", name: badge, widget: string }
              - { label: "Heading — first part", name: headingLead, widget: string }
              - { label: "Heading — highlighted part", name: headingHighlight, widget: string }
              - { label: "Intro paragraph", name: intro, widget: text }
              - { label: "Button label", name: ctaLabel, widget: string }
              - { label: "Button link", name: ctaHref, widget: string, hint: "Internal page starts with / (e.g. /pool-simulator). External starts with https://" }
              - label: "Highlight chips"
                name: highlights
                widget: list
                field: { label: "Highlight", name: highlight, widget: string }
              - label: "Card 1 — main card with image"
                name: card1
                widget: object
                fields:
                  - { label: "Image", name: image, widget: image }
                  - { label: "Image alt text", name: imageAlt, widget: string }
                  - { label: "Title", name: title, widget: string }
                  - { label: "Description", name: description, widget: text }
              - label: "Card 2 — quality / stats card"
                name: card2
                widget: object
                fields:
                  - { label: "Title", name: title, widget: string }
                  - { label: "Description", name: description, widget: text }
                  - label: "Stat labels (3, under the numbers)"
                    name: statLabels
                    widget: list
                    field: { label: "Label", name: label, widget: string }
              - label: "Card 3 — full-service card"
                name: card3
                widget: object
                fields:
                  - { label: "Card link", name: href, widget: string, hint: "Where the card links to. Internal starts with / (e.g. /our-process). External starts with https://" }
                  - { label: "Title", name: title, widget: string }
                  - { label: "Description", name: description, widget: text }
                  - label: "Checklist items"
                    name: items
                    widget: list
                    field: { label: "Item", name: item, widget: string }
              - label: "Card 4 — family-owned card"
                name: card4
                widget: object
                fields:
                  - { label: "Card link", name: href, widget: string, hint: "Where the card links to. Internal starts with / (e.g. /why-maxima). External starts with https://" }
                  - { label: "Title", name: title, widget: string }
                  - { label: "Description", name: description, widget: text }
                  - { label: "Rating note", name: ratingNote, widget: string }
              - label: "Card 5 — San Juan partnership card"
                name: card5
                widget: object
                fields:
                  - { label: "Card link", name: href, widget: string, hint: "Internal starts with / . External starts with https:// (e.g. https://sanjuanpools.com/)" }
                  - { label: "Logo image", name: logo, widget: image }
                  - { label: "Title", name: title, widget: string }
                  - { label: "Description", name: description, widget: text }
                  - { label: "Link label", name: linkLabel, widget: string }
          - label: "Featured Pools section"
            name: featuredPools
            widget: object
            collapsed: true
            fields:
              - { label: "Small badge", name: badge, widget: string }
              - { label: "Heading — first part", name: headingLead, widget: string }
              - { label: "Heading — highlighted part", name: headingHighlight, widget: string }
              - { label: "Intro paragraph", name: intro, widget: text }
              - { label: "'View all' button label", name: viewAllLabel, widget: string }
              - { label: "'View all' button link", name: viewAllHref, widget: string, hint: "Internal page starts with / (e.g. /pools). External starts with https://" }
              - label: "Featured pool (large card)"
                name: featured
                widget: object
                fields:
                  - { label: "Pool name", name: name, widget: string, hint: "Must match a real pool name — it links to /pools/<name>." }
                  - { label: "Description", name: description, widget: text }
                  - { label: "Shape", name: shape, widget: string }
                  - { label: "Size", name: size, widget: string }
                  - { label: "Depth", name: depth, widget: string }
                  - { label: "Image", name: image, widget: image }
                  - { label: "Corner badge", name: popularBadge, widget: string }
                  - { label: "Small label above name", name: featuredLabel, widget: string }
                  - { label: "Details link label", name: detailsLabel, widget: string }
              - label: "Pool grid (smaller cards)"
                name: pools
                widget: list
                summary: "{{fields.name}}"
                fields:
                  - { label: "Pool name", name: name, widget: string, hint: "Must match a real pool name — it links to /pools/<name>." }
                  - { label: "Shape", name: shape, widget: string }
                  - { label: "Size", name: size, widget: string }
                  - { label: "Image", name: image, widget: image }
          - label: "Process / How It's Made section"
            name: process
            widget: object
            collapsed: true
            fields:
              - { label: "Small badge", name: badge, widget: string }
              - { label: "Heading — first part", name: headingLead, widget: string }
              - { label: "Heading — highlighted part", name: headingHighlight, widget: string }
              - { label: "Intro paragraph", name: intro, widget: text }
              - { label: "Button label", name: ctaLabel, widget: string }
              - { label: "Button link", name: ctaHref, widget: string, hint: "Internal page starts with / (e.g. /contact). External starts with https://" }
              - { label: "Note under the button", name: ctaNote, widget: string }
              - label: "Steps"
                name: steps
                widget: list
                summary: "{{fields.step}} — {{fields.title}}"
                fields:
                  - { label: "Step number", name: step, widget: string }
                  - { label: "Title", name: title, widget: string }
                  - { label: "Description", name: description, widget: text }
                  - { label: "Image", name: image, widget: image }
          - label: "Pool Shapes section"
            name: poolShapes
            widget: object
            collapsed: true
            fields:
              - { label: "Small badge", name: badge, widget: string }
              - { label: "Heading — first part", name: headingLead, widget: string }
              - { label: "Heading — highlighted part", name: headingHighlight, widget: string }
              - { label: "Intro paragraph", name: intro, widget: text }
              - label: "Shapes"
                name: shapes
                widget: list
                summary: "{{fields.name}}"
                fields:
                  - { label: "Shape name", name: name, widget: string }
                  - { label: "Description", name: description, widget: text }
                  - label: "Example models (chips)"
                    name: models
                    widget: list
                    field: { label: "Model", name: model, widget: string }
                  - { label: "Image", name: image, widget: image }
          - label: "Outdoor Living section"
            name: outdoorLiving
            widget: object
            collapsed: true
            fields:
              - { label: "Small badge", name: badge, widget: string }
              - { label: "Heading — first part", name: headingLead, widget: string }
              - { label: "Heading — highlighted part", name: headingHighlight, widget: string }
              - { label: "Intro paragraph", name: intro, widget: text }
              - { label: "Button label", name: ctaLabel, widget: string }
              - { label: "Button link", name: ctaHref, widget: string, hint: "Internal page starts with / (e.g. /outdoor-living). External starts with https://" }
              - { label: "Hero image", name: heroImage, widget: image }
              - { label: "Hero image alt text", name: heroImageAlt, widget: string }
              - { label: "Floating label — title", name: heroLabelTitle, widget: string }
              - { label: "Floating label — subtitle", name: heroLabelSub, widget: string }
              - label: "Service cards"
                name: services
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - { label: "Icon", name: icon, widget: select, options: ["UtensilsCrossed", "Flame", "Lamp"] }
                  - { label: "Title", name: title, widget: string }
                  - { label: "Description", name: description, widget: text }
                  - { label: "Image", name: image, widget: image }
              - { label: "'Learn more' link label", name: learnMoreLabel, widget: string }
              - { label: "'Learn more' link (all service cards)", name: learnMoreHref, widget: string, hint: "Internal page starts with / (e.g. /outdoor-living). External starts with https://" }
              - { label: "Stats strip link (all 4 cards)", name: statsHref, widget: string, hint: "Where the 4 stat cards link to. External starts with https:// (e.g. https://www.maximaconcrete.com)" }
              - label: "Stats strip"
                name: stats
                widget: list
                summary: "{{fields.value}} — {{fields.label}}"
                fields:
                  - { label: "Value", name: value, widget: string }
                  - { label: "Label", name: label, widget: string }
              - { label: "'Explore more' button label", name: exploreMoreLabel, widget: string }
              - { label: "'Explore more' button link", name: exploreMoreHref, widget: string, hint: "Internal starts with / . External starts with https:// (e.g. https://www.maximaconcrete.com/)" }
          - label: "Pool Sizes section"
            name: poolSizes
            widget: object
            collapsed: true
            fields:
              - { label: "Small badge", name: badge, widget: string }
              - { label: "Heading — first part", name: headingLead, widget: string }
              - { label: "Heading — highlighted part", name: headingHighlight, widget: string }
              - { label: "Intro paragraph", name: intro, widget: text }
              - { label: "Featured badge text", name: featuredBadge, widget: string }
              - { label: "'Available sizes' label", name: availableSizesLabel, widget: string }
              - label: "Sizes"
                name: sizes
                widget: list
                summary: "{{fields.category}}"
                fields:
                  - { label: "Category", name: category, widget: select, options: ["Small", "Medium", "Large"], hint: "Controls the card color. Keep one of Small/Medium/Large." }
                  - { label: "Area", name: area, widget: string }
                  - { label: "Description", name: description, widget: text }
                  - label: "Dimensions (chips)"
                    name: dimensions
                    widget: list
                    field: { label: "Dimension", name: dimension, widget: string }
                  - { label: "Image", name: image, widget: image }
                  - { label: "Mark as 'Most Popular'", name: featured, widget: boolean, default: false }
              - { label: "Bottom CTA text", name: ctaText, widget: string }
              - { label: "Bottom CTA button label", name: ctaLabel, widget: string }
              - { label: "Bottom CTA button link", name: ctaHref, widget: string, hint: "Internal page starts with / (e.g. /pool-simulator). External starts with https://" }
          - label: "Financing section"
            name: financing
            widget: object
            collapsed: true
            fields:
              - { label: "Small badge", name: badge, widget: string }
              - { label: "Heading — first part", name: headingLead, widget: string }
              - { label: "Heading — highlighted part", name: headingHighlight, widget: string }
              - label: "Perks"
                name: perks
                widget: list
                summary: "{{fields.text}}"
                fields:
                  - { label: "Icon", name: icon, widget: select, options: ["Banknote", "Clock", "ShieldCheck"] }
                  - { label: "Text", name: text, widget: string }
              - { label: "Primary button label", name: ctaPrimaryLabel, widget: string }
              - { label: "Primary button link", name: ctaPrimaryHref, widget: string, hint: "Internal page starts with / (e.g. /financing). External starts with https://" }
              - { label: "Secondary button label", name: ctaSecondaryLabel, widget: string }
              - { label: "Secondary button link", name: ctaSecondaryHref, widget: string, hint: "The Lyon Financial apply link (keep the ?lid= tracking code)." }
          - label: "Facebook / Social section"
            name: socialFeed
            widget: object
            collapsed: true
            fields:
              - { label: "Small badge", name: badge, widget: string }
              - { label: "Heading — first part", name: headingLead, widget: string }
              - { label: "Heading — highlighted part", name: headingHighlight, widget: string }
              - { label: "Intro paragraph", name: intro, widget: text }
              - { label: "Button label", name: ctaLabel, widget: string }
              - { label: "Facebook page URL", name: facebookUrl, widget: string, hint: "Must be a Facebook Page URL for the live feed to show." }
              - { label: "Fallback title", name: fallbackTitle, widget: string }
              - { label: "Fallback text", name: fallbackText, widget: text }
              - { label: "Fallback link label", name: fallbackLinkLabel, widget: string }
          - label: "Locations section"
            name: locations
            widget: object
            collapsed: true
            fields:
              - { label: "Small badge", name: badge, widget: string }
              - { label: "Heading — first part", name: headingLead, widget: string }
              - { label: "Heading — highlighted part", name: headingHighlight, widget: string }
              - { label: "Intro paragraph", name: intro, widget: text }
              - { label: "'Cities & Towns' label", name: citiesLabel, widget: string }
              - { label: "'Counties' label", name: countiesLabel, widget: string }
              - { label: "Bottom CTA text", name: ctaText, widget: string }
              - { label: "Bottom CTA link label", name: ctaLabel, widget: string }
              - { label: "Bottom CTA link", name: ctaHref, widget: string, hint: "Internal page starts with / (e.g. /contact). External starts with https://" }
          - label: "Final Call-to-Action section"
            name: finalCta
            widget: object
            collapsed: true
            fields:
              - { label: "Heading — first line", name: headingLead, widget: string }
              - { label: "Heading — highlighted line", name: headingHighlight, widget: string }
              - { label: "Intro paragraph", name: intro, widget: text }
              - { label: "Primary button label", name: primaryLabel, widget: string }
              - { label: "Primary button link", name: primaryHref, widget: string, hint: "Internal page starts with / (e.g. /contact). External starts with https://" }
              - { label: "Simulator button label", name: simulatorLabel, widget: string }
              - { label: "Simulator button link", name: simulatorHref, widget: string, hint: "Internal page starts with / (e.g. /pool-simulator). External starts with https://" }
              - { label: "Phone (shown)", name: phone, widget: string }
              - { label: "Phone link", name: phoneHref, widget: string, hint: "Format: tel:+16143845081" }
              - { label: "Background image", name: backgroundImage, widget: image }
              - { label: "Background image alt text", name: backgroundImageAlt, widget: string }
              - label: "Info cards"
                name: infoCards
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - { label: "Icon", name: icon, widget: select, options: ["Phone", "MapPin", "Clock"] }
                  - { label: "Title", name: title, widget: string }
                  - { label: "Detail (main line)", name: detail, widget: string }
                  - { label: "Sub (second line)", name: sub, widget: string }

      - name: testimonials
        label: "Testimonials (shared)"
        file: "src/content/testimonials.json"
        format: json
        description: "Customer reviews shown on the Home page and the Pool Closing page."
        fields:
          - label: "Section heading"
            name: section
            widget: object
            collapsed: true
            fields:
              - { label: "Small badge", name: badge, widget: string }
              - { label: "Heading — first part", name: headingLead, widget: string }
              - { label: "Heading — highlighted part", name: headingHighlight, widget: string }
              - { label: "Intro paragraph", name: intro, widget: text }
              - { label: "Rating word (e.g. Excellent)", name: excellentLabel, widget: string }
              - { label: "'Based on' label", name: basedOnLabel, widget: string }
              - { label: "'See all reviews' button label", name: ctaLabel, widget: string }
              - { label: "'See all reviews' button link", name: ctaHref, widget: string, hint: "Internal page starts with / (e.g. /reviews). External starts with https://" }
              - label: "Bottom trust badges"
                name: trustBar
                widget: list
                field: { label: "Badge", name: badge, widget: string }
          - label: "Reviews"
            name: reviews
            widget: list
            summary: "{{fields.name}} — {{fields.location}}"
            fields:
              - { label: "Name", name: name, widget: string }
              - { label: "Location", name: location, widget: string }
              - { label: "Review text", name: text, widget: text }
              - { label: "Rating (1–5)", name: rating, widget: number, default: 5, min: 1, max: 5 }
              - { label: "Date label (e.g. 2 months ago)", name: date, widget: string }

      - name: why-maxima
        label: "Why Maxima Page"
        file: "src/content/pages/why-maxima.json"
        format: json
        preview_path: "why-maxima/"
        fields:
          - label: "SEO"
            name: seo
            widget: object
            collapsed: true
            fields:
              - { label: "Browser / Search Title", name: title, widget: string }
              - { label: "Meta Description", name: description, widget: text }
              - { label: "Social Share Title", name: ogTitle, widget: string }
              - { label: "Social Share Description", name: ogDescription, widget: text }
          - label: "Hero (top of the page)"
            name: hero
            widget: object
            collapsed: true
            fields:
              - { label: "Background image", name: image, widget: image }
              - { label: "Small badge", name: badge, widget: string }
              - { label: "Heading — first part", name: headingLead, widget: string }
              - { label: "Heading — highlighted part", name: headingHighlight, widget: string }
              - { label: "Subtitle paragraph", name: subtitle, widget: text }
              - { label: "Estimate button label", name: estimateLabel, widget: string }
              - { label: "Estimate button link", name: estimateHref, widget: string, hint: "Internal page starts with / (e.g. /contact). External starts with https://" }
              - { label: "Simulator button label", name: simulatorLabel, widget: string }
              - { label: "Simulator button link", name: simulatorHref, widget: string, hint: "Internal starts with / . External starts with https://" }
              - { label: "Phone (shown)", name: phoneDisplay, widget: string }
              - { label: "Phone link", name: phoneHref, widget: string, hint: "Format: tel:+16143845081" }
          - label: "Three Pillars section"
            name: pillarsSection
            widget: object
            collapsed: true
            fields:
              - { label: "Small badge", name: badge, widget: string }
              - { label: "Heading — first part", name: headingLead, widget: string }
              - { label: "Heading — highlighted part", name: headingHighlight, widget: string }
              - { label: "Intro paragraph", name: intro, widget: text }
          - label: "Pillars (3 cards)"
            name: pillars
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: "Icon", name: icon, widget: select, options: ["Eye", "ShieldCheck", "Zap"] }
              - { label: "Title", name: title, widget: string }
              - { label: "Description", name: description, widget: text }
          - label: "In-House Team section"
            name: team
            widget: object
            collapsed: true
            fields:
              - { label: "Small badge", name: badge, widget: string }
              - { label: "Image", name: image, widget: image }
              - { label: "Floating label — title", name: floatingTitle, widget: string }
              - { label: "Floating label — subtitle", name: floatingSubtitle, widget: string }
              - { label: "Heading — first part", name: headingLead, widget: string }
              - { label: "Heading — highlighted part", name: headingHighlight, widget: string }
              - { label: "Paragraph 1", name: paragraph1, widget: text }
              - { label: "Paragraph 2", name: paragraph2, widget: text }
              - label: "Checklist points"
                name: points
                widget: list
                field: { label: "Point", name: point, widget: string }
              - { label: "Button label", name: ctaLabel, widget: string }
              - { label: "Button link", name: ctaHref, widget: string, hint: "External starts with https:// (e.g. https://www.maximaconcrete.com/)" }
          - label: "San Juan Partnership section"
            name: sanJuan
            widget: object
            collapsed: true
            fields:
              - { label: "Small badge", name: badge, widget: string }
